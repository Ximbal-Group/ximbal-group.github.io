<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ximbal Group — Mexico's Gateway to the Middle East</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="apple-touch-icon" href="favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>

  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; color: #1a1a1a; background: #fff; -webkit-font-smoothing: antialiased; text-wrap: pretty; }
    h1, h2, h3 { font-family: 'Cinzel', serif; text-transform: uppercase; }
    a { text-decoration: none; }
    ul { list-style: none; }
    #home, #about, #services, #traveling, #clients, #stories, #contact { scroll-margin-top: 76px; }

    /* ── Variant Tokens ─────────────────────────────────────────────────────── */
    :root {
      --nav-bg:     rgba(22,22,22,.95);
      --nav-fg:     rgba(255,255,255,.78);
      --logo-col:   #f0ba15;
      --lang-brd:   #f0ba15;
      --lang-col:   #f0ba15;
      --about-bg:   #ffffff;
      --chk-col:    #d5227d;
      --svc-bg:     #141414;
      --svc-card:   #1f1f1f;
      --svc-brd:    rgba(255,255,255,.06);
      --svc-title:  #f0ba15;
      --svc-body:   rgba(255,255,255,.68);
      --svc-pt:     rgba(255,255,255,.48);
      --svc-bullet: #f0ba15;
      --svc-h2:     #ffffff;
      --svc-eyebrow:#f0ba15;
      --cli-bg:     #f8f6f3;
      --cli-card:   #ffffff;
      --cli-title:  #d5227d;
      --cnt-bg:     #d5227d;
      --foot-bg:    #141414;
      --story-cnt:       #141414;
      --story-cnt-text:  rgba(255,255,255,.75);
      --story-title:     #ffffff;
      --story-sub:       #f0ba15;
      --story-badge-bg:  #f0ba15;
      --story-badge-col: #1a1a1a;
      --story-dot:       #f0ba15;
    }
    body.v-luminous {
      --nav-bg:     rgba(255,255,255,.96);
      --nav-fg:     #555555;
      --logo-col:   #d5227d;
      --lang-brd:   #d5227d;
      --lang-col:   #d5227d;
      --about-bg:   #f8f6f3;
      --chk-col:    #088173;
      --svc-bg:     #f8f6f3;
      --svc-card:   #ffffff;
      --svc-brd:    rgba(0,0,0,.07);
      --svc-title:  #d5227d;
      --svc-body:   #444444;
      --svc-pt:     #666666;
      --svc-bullet: #d5227d;
      --svc-h2:     #1a1a1a;
      --svc-eyebrow:#d5227d;
      --cli-bg:     #e0f4f2;
      --cli-card:   #ffffff;
      --cli-title:  #088173;
      --cnt-bg:     #088173;
      --foot-bg:    #088173;
      --story-cnt:       #f8f6f3;
      --story-cnt-text:  #555555;
      --story-title:     #1a1a1a;
      --story-sub:       #d5227d;
      --story-badge-bg:  #d5227d;
      --story-badge-col: #ffffff;
      --story-dot:       #d5227d;
    }

    /* ── Utilities ───────────────────────────────────────────────────────────── */
    .container  { max-width: 1200px; margin: 0 auto; padding: 0 48px; }
    .eyebrow    { display: block; font-size: .71rem; font-weight: 600; letter-spacing: .22em; text-transform: uppercase; color: #d5227d; margin-bottom: 10px; }
    .eyebrow--inv { color: rgba(255,255,255,.6); }
    .eyebrow-svc  { color: var(--svc-eyebrow); }
    .eyebrow--lg  { font-size: 21px; }
    .gold-rule  { width: 56px; height: 2px; background: #f0ba15; margin: 22px 0 26px; }
    .body-lg    { font-size: 1.02rem; line-height: 1.75; color: #555; }
    .sh         { margin-bottom: 58px; }
    .sh--c      { text-align: center; }
    .sh h2, .sh-h2 { font-size: 2.5rem; line-height: 1.16; letter-spacing: .05em; margin-top: 8px; }
    .sh-h2      { color: var(--svc-h2); }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; font-family: 'DM Sans', sans-serif; font-size: .8rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; border-radius: 4px; border: 2px solid transparent; cursor: pointer; transition: background .18s, border-color .18s, color .18s, transform .12s; }
    .btn:active { transform: scale(.98); }
    .btn-primary   { background: #d5227d; color: #fff; border-color: #d5227d; }
    .btn-primary:hover { background: #a8185f; border-color: #a8185f; }
    .btn-secondary { background: transparent; color: #d5227d; border-color: #d5227d; }
    .btn-secondary:hover { background: #fce8f3; }
    .btn-ghost  { background: transparent; color: #fff; border-color: rgba(255,255,255,.42); }
    .btn-ghost:hover { background: rgba(255,255,255,.1); border-color: #fff; }
    .btn-gold   { background: #f0ba15; color: #1a1a1a; border-color: #f0ba15; }
    .btn-gold:hover { background: #c49508; border-color: #c49508; }

    /* ── Navigation ──────────────────────────────────────────────────────────── */
    .xnav { position: fixed; top: 0; left: 0; right: 0; z-index: 999; background: var(--nav-bg); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); transition: box-shadow .3s; border-bottom: 1px solid transparent; }
    .xnav.scrolled { box-shadow: 0 2px 24px rgba(0,0,0,.18); border-bottom-color: rgba(255,255,255,.04); }
    body.v-luminous .xnav.scrolled { border-bottom-color: rgba(0,0,0,.07); }
    .xnav__i  { display: flex; align-items: center; gap: 20px; height: 70px; }
    .xnav__logo { font-family: 'Cinzel', serif; font-size: .86rem; font-weight: 700; letter-spacing: .24em; color: var(--logo-col); white-space: nowrap; display: flex; align-items: center; }
    .xnav__logo-img { height: 34px; width: auto; display: block; }
    .xnav__logo em { font-style: normal; font-weight: 400; color: var(--nav-fg); font-size: .78rem; }
    .xnav__links { display: flex; gap: 28px; margin-left: auto; }
    .xnav__lk { font-size: .75rem; font-weight: 500; letter-spacing: .09em; text-transform: uppercase; color: var(--nav-fg); transition: color .2s; }
    .xnav__lk:hover { color: var(--logo-col); }
    .xnav__lang { background: transparent; border: 1.5px solid var(--lang-brd); color: var(--lang-col); font-family: 'DM Sans', sans-serif; font-size: .7rem; font-weight: 700; letter-spacing: .12em; padding: 5px 13px; border-radius: 4px; cursor: pointer; transition: all .18s; flex-shrink: 0; }
    .xnav__lang:hover { background: var(--lang-brd); color: #fff; }

    /* ── Hero — Prestige ─────────────────────────────────────────────────────── */
    .xhero-p { position: relative; min-height: 100vh; background-size: cover; background-position: center top; display: flex; align-items: center; overflow: hidden; }
    .xhero-p__ov { position: absolute; inset: 0; background: linear-gradient(100deg, rgba(249,247,243,.97) 0%, rgba(249,247,243,.9) 30%, rgba(249,247,243,.55) 55%, rgba(249,247,243,.12) 80%, rgba(249,247,243,0) 100%), linear-gradient(rgba(255,255,255,.22), rgba(255,250,242,.1)); }
    .xhero-p__body { position: relative; z-index: 2; padding: 140px 48px 100px; max-width: 820px; }
    .xh-eyebrow { font-size: .7rem; font-weight: 600; letter-spacing: .26em; text-transform: uppercase; color: #f0ba15; margin-bottom: 18px; }
    .xh-brand { font-family: 'Cinzel', serif; font-weight: 700; text-transform: uppercase; font-size: clamp(1.85rem, 5vw, 4rem); line-height: 1.0; letter-spacing: .06em; color: #d5227d; margin-bottom: 4px; white-space: nowrap; }
    .xh-bar  { width: 72px; height: 1.5px; background: #f0ba15; margin: 18px 0 30px; }
    .xh-hl   { font-size: clamp(1.5rem, 2.9vw, 2.6rem); font-weight: 700; line-height: 1.12; letter-spacing: .06em; color: #1a1a1a; margin-bottom: 22px; }
    .xh-tag  { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.3rem, 2vw, 1.6rem); font-weight: 300; font-style: italic; color: #088173; letter-spacing: .03em; margin-bottom: 14px; }
    .xh-body { font-size: .95rem; color: #555; margin-bottom: 40px; max-width: 520px; line-height: 1.68; }
    .xh-ctas { display: flex; gap: 14px; flex-wrap: wrap; }

    /* ── Hero — Luminous ─────────────────────────────────────────────────────── */
    .xhero-l { display: grid; grid-template-columns: 55% 45%; min-height: 100vh; }
    .xhero-l__text { display: flex; flex-direction: column; justify-content: center; padding: 120px 56px 80px 48px; }
    .xh-hl-l   { font-size: clamp(2rem, 3.8vw, 3.4rem); font-weight: 700; line-height: 1.06; letter-spacing: .05em; color: #1a1a1a; margin: 14px 0 0; }
    .xh-bar-l  { width: 60px; height: 2px; background: #f0ba15; margin: 26px 0; }
    .xh-tag-l  { font-family: 'Cormorant Garamond', serif; font-size: 1.12rem; font-style: italic; color: #088173; margin-bottom: 12px; letter-spacing: .02em; }
    .xh-body-l { font-size: .95rem; line-height: 1.7; color: #666; margin-bottom: 36px; max-width: 440px; }
    .xhero-l__img { background-size: cover; background-position: center; }

    /* ── About ───────────────────────────────────────────────────────────────── */
    .xabout { padding: 100px 0 60px; background: var(--about-bg); }
    .xabout__g { display: grid; grid-template-columns: 1fr 1fr; gap: 88px; align-items: stretch; }
    .xabout__lt h2 { font-size: 2.1rem; line-height: 1.18; letter-spacing: .05em; margin: 8px 0 20px; }
    .xabout__diffs { display: flex; flex-direction: column; justify-content: space-between; gap: 0; padding-top: 194px; }
    .xabout__diff  { display: flex; gap: 14px; align-items: flex-start; font-size: .93rem; line-height: 1.58; color: #444; }
    .xabout__chk   { color: var(--chk-col); font-size: .95rem; font-weight: 700; flex-shrink: 0; margin-top: 2px; }

    /* ── Services ────────────────────────────────────────────────────────────── */
    .xsvc { padding: 60px 0 100px; background: var(--svc-bg); }
    .xsvc__g { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
    .xsvc__card { background: var(--svc-card); border: 1px solid var(--svc-brd); border-radius: 8px; padding: 30px 28px; display: flex; flex-direction: column; gap: 10px; transition: transform .25s, box-shadow .25s; }
    .xsvc__card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,.2); }
    .xsvc__top-bar { width: 36px; height: 2px; background: var(--svc-title); border-radius: 1px; flex-shrink: 0; }
    .xsvc__title   { font-family: 'Cinzel', serif; font-size: .82rem; font-weight: 600; letter-spacing: .11em; color: var(--svc-title); text-transform: uppercase; }
    .xsvc__body    { font-size: .87rem; line-height: 1.64; color: var(--svc-body); }
    .xsvc__pts     { display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
    .xsvc__pts li  { font-size: .78rem; color: var(--svc-pt); padding-left: 14px; position: relative; line-height: 1.5; }
    .xsvc__pts li::before { content: '—'; position: absolute; left: 0; color: var(--svc-bullet); font-size: .7rem; }

    /* ── Clients ─────────────────────────────────────────────────────────────── */
    .xcli { padding: 92px 0; background: var(--cli-bg); }
    .xcli__g { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .xcli__card { background: var(--cli-card); border: 1px solid rgba(0,0,0,.07); border-radius: 8px; padding: 26px 24px; transition: box-shadow .22s, transform .22s; }
    .xcli__card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); transform: translateY(-2px); }
    .xcli__title { font-size: .88rem; font-weight: 700; letter-spacing: .04em; color: var(--cli-title); margin-bottom: 10px; line-height: 1.4; }
    .xcli__body  { font-size: .84rem; line-height: 1.62; color: #666; }

    /* ── Story ───────────────────────────────────────────────────────────────── */
    .xstory { padding-top: 92px; }
    .xstory__top { margin-bottom: 44px; }
    .xstory__top h2 { font-size: 2.5rem; letter-spacing: .05em; margin-top: 8px; }
    .xstory__case { display: grid; grid-template-columns: 1fr 1fr; min-height: 540px; }
    .xstory__case--p { direction: rtl; }
    .xstory__case--p .xstory__cnt { direction: ltr; }
    .xstory__img { background-size: cover; background-position: center; }
    .xstory__cnt { background: var(--story-cnt); padding: 64px 56px; display: flex; flex-direction: column; justify-content: center; gap: 16px; }
    .xstory__badge { display: inline-block; background: var(--story-badge-bg); color: var(--story-badge-col); font-size: .66rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; padding: 4px 14px; border-radius: 99px; align-self: flex-start; }
    .xstory__title { font-family: 'Cinzel', serif; font-size: 1.7rem; font-weight: 700; letter-spacing: .07em; color: var(--story-title); text-transform: uppercase; line-height: 1.14; }
    .xstory__sub   { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; color: var(--story-sub); line-height: 1.4; }
    .xstory__body  { font-size: .87rem; line-height: 1.74; color: var(--story-cnt-text); }
    .xstory__ach   { display: flex; flex-direction: column; gap: 10px; }
    .xstory__ach-li { display: flex; gap: 12px; align-items: flex-start; }
    .xstory__dot   { width: 6px; height: 6px; background: var(--story-dot); border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
    .xstory__ach-li span:last-child { font-size: .84rem; line-height: 1.52; color: var(--story-cnt-text); }
    /* Founder */
    .xstory__founder { display: flex; gap: 36px; padding: 64px 0 96px; align-items: flex-start; }
    .xstory__av { width: 76px; height: 76px; border-radius: 50%; background: linear-gradient(135deg, #d5227d, #088173); display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; color: #fff; flex-shrink: 0; letter-spacing: .08em; }
    .xstory__fi { flex: 1; }
    .xstory__fn { font-family: 'Cinzel', serif; font-size: 1.2rem; font-weight: 700; letter-spacing: .07em; color: #1a1a1a; margin: 8px 0 4px; }
    .xstory__ft { font-size: .82rem; color: #d5227d; font-weight: 600; letter-spacing: .05em; margin-bottom: 12px; }
    .xstory__fb { font-size: .88rem; line-height: 1.72; color: #555; max-width: 680px; }

    /* ── Experts ─────────────────────────────────────────────────────────────── */
    .xexperts { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; padding: 64px 0 96px; }
    .xexpert  { display: flex; gap: 24px; align-items: stretch; }
    .xexpert__av { width: 76px; height: 76px; border-radius: 50%; background: linear-gradient(135deg, #8b2a6e 0%, #2d6a65 100%); display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: .95rem; font-weight: 700; color: #fff; flex-shrink: 0; letter-spacing: .06em; }
    .xexpert__info { flex: 1; display: flex; flex-direction: column; }
    .xexpert__eyebrow { display: block; font-size: 21px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: #d5227d; margin-bottom: 6px; }
    .xexpert__name { font-family: 'Cinzel', serif; font-size: 1.28rem; font-weight: 700; letter-spacing: .07em; color: #1a1a1a; margin: 0 0 5px; text-transform: uppercase; }
    .xexpert__role { font-size: .82rem; color: #d5227d; font-weight: 600; letter-spacing: .02em; margin-bottom: 14px; }
    .xexpert__bio  { font-size: .88rem; line-height: 1.72; color: #555; }
    .xexpert__tags { margin-top: 10px; display: none; }
    .xexpert__tag  { font-size: .76rem; color: transparent; font-weight: 500; }
    @media (max-width: 760px) { .xexperts { grid-template-columns: 1fr; gap: 40px; padding: 48px 0 72px; } }

    /* ── Contact ─────────────────────────────────────────────────────────────── */
    .xcnt { position: relative; padding: 88px 0 56px; background: var(--cnt-bg); overflow: hidden; }
    .xcnt__g { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; position: relative; z-index: 1; }
    .xcnt__hl   { font-family: 'Cinzel', serif; font-size: 2.8rem; font-weight: 700; letter-spacing: .05em; color: #fff; margin: 10px 0 18px; line-height: 1.1; }
    .xcnt__body { color: rgba(255,255,255,.78); font-size: 1.02rem; line-height: 1.7; }
    .xcnt__items { display: flex; flex-direction: column; gap: 24px; }
    .xcnt__item  { display: flex; gap: 18px; align-items: flex-start; }
    .xcnt__ico   { width: 40px; height: 40px; border: 1.5px solid rgba(255,255,255,.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1rem; flex-shrink: 0; }
    .xcnt__lbl   { font-size: .64rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.48); margin-bottom: 3px; }
    .xcnt__val   { color: #fff; font-size: .93rem; }
    .xcnt__val--link { display: inline-block; transition: color .18s; }
    .xcnt__val--link:hover { color: #f0ba15; text-decoration: underline; }

    /* ── Footer ─────────────────────────────────────────────────────────────── */
    .xfoot { background: var(--foot-bg); padding: 30px 0; }
    .xfoot__i    { display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; }
    .xfoot__logo { font-family: 'Cinzel', serif; font-size: 1.05rem; font-weight: 700; letter-spacing: .22em; color: #fff; text-transform: uppercase; }
    .xfoot__logo em { font-style: normal; font-weight: 400; opacity: .6; }
    .xfoot__tag  { font-family: 'Cormorant Garamond', serif; font-size: .95rem; font-style: italic; color: rgba(255,255,255,.5); }
    .xfoot__copy { font-size: .7rem; color: rgba(255,255,255,.28); letter-spacing: .05em; margin-top: 4px; }

    /* ── Ximbal Traveling ────────────────────────────────────────────────────── */
    .xtrav { padding: 100px 0; background: #ffffff; }
    .xtrav__g { display: grid; grid-template-columns: .9fr 1.1fr; gap: 72px; align-items: center; }
    .xtrav__media { position: relative; min-height: 460px; border-radius: 8px; background-size: cover; background-position: center; box-shadow: 0 8px 32px rgba(0,0,0,.14); }
    .xtrav__h2 { font-size: 2.45rem; line-height: 1.16; letter-spacing: .05em; margin: 8px 0 0; color: #1a1a1a; }
    .xtrav__body { font-size: .96rem; line-height: 1.76; color: #555; margin-bottom: 18px; max-width: 560px; }
    .xtrav__pillars { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; margin-top: 10px; }
    .xtrav__pillar { display: flex; align-items: center; gap: 10px; font-family: 'Cinzel', serif; font-size: .78rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #d5227d; }
    .xtrav__pillar-dot { width: 7px; height: 7px; border-radius: 50%; background: #f0ba15; flex-shrink: 0; }

    /* ── Story gallery / IG / founders intro / expert meta ───────────────────── */
    .xstory__ig { display: inline-flex; align-items: center; gap: 8px; margin-top: 8px; font-size: .8rem; font-weight: 600; letter-spacing: .04em; color: var(--story-sub); align-self: flex-start; transition: color .18s; }
    .xstory__ig:hover { color: #d5227d; }
    .xstory__gallery-wrap { padding: 56px 0 8px; }
    .xstory__gallery-title { font-family: 'Cinzel', serif; font-size: .95rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #1a1a1a; margin-bottom: 20px; }
    .xstory__gallery-intro { font-size: .98rem; line-height: 1.72; color: #555; max-width: 760px; margin-bottom: 26px; }
    .xstory__gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .xstory__gallery image-slot { display: block; width: 100%; height: 260px; border-radius: 8px; }
    .xstory__founders-intro { padding: 60px 0 4px; max-width: 880px; }
    .xstory__founders-text { font-family: 'Cormorant Garamond', serif; font-size: 1.38rem; line-height: 1.58; color: #444; font-weight: 400; }
    .xexpert__meta { display: flex; flex-wrap: wrap; gap: 8px 22px; align-items: center; margin-top: auto; padding-top: 14px; }
    .xexpert__loc { display: inline-flex; align-items: center; gap: 6px; font-size: .78rem; color: #666; }
    .xexpert__loc svg { width: 14px; height: 14px; color: #999; }
    .xexpert__li { display: inline-flex; align-items: center; gap: 6px; font-size: .78rem; font-weight: 600; color: #d5227d; transition: color .18s; }
    .xexpert__li:hover { color: #a8185f; }
    .xexpert__li svg { width: 15px; height: 15px; }

    /* ── Scroll animations ───────────────────────────────────────────────────── */
    [data-anim] { opacity: 0; transform: translateY(24px); transition: opacity .72s ease-out, transform .72s ease-out; }
    [data-anim].in { opacity: 1; transform: none; }
    @media (prefers-reduced-motion: reduce) { [data-anim] { opacity: 1; transform: none; transition: none; } }

    /* ── Responsive ──────────────────────────────────────────────────────────── */
    @media (max-width: 960px) {
      .xhero-l { grid-template-columns: 1fr; min-height: auto; }
      .xhero-l__img { height: 340px; }
      .xhero-l__text { padding: 100px 32px 60px; }
      .xabout__g { grid-template-columns: 1fr; gap: 48px; }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* BEGIN USAGE */
/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() {
      return ['shape', 'radius', 'mask', 'fit', 'position', 'placeholder', 'src', 'id'];
    }

    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };
        }
        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        // Stashed so _exitReframe (Escape / outside-click mid-drag) can
        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      // Wheel zoom stays available inside reframe mode as a trackpad nicety —
      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView();
        this._applyView();
      }, { passive: false });
    }

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');
      }
      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);
      this.addEventListener('drop', this);
      subs.add(this._subFn);
      // width%/height% in _applyView encode the frame aspect at call time —
      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()
      // re-seeds _view from stored before clamp/apply, so a shrink→grow
      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());
      this._ro.observe(this);
      load();
      this._render();
    }

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();
    }

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        // Without preventDefault the browser never fires 'drop'.
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        // dragenter/leave fire for every descendant crossing — count depth
        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }
    }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle

/* ── Breadcrumb ──────────────────────────────────────────────────────────── */
const SECTIONS = [
  { id: 'home',      key: 'home'      },
  { id: 'about',     key: 'about'     },
  { id: 'services',  key: 'services'  },
  { id: 'traveling', key: 'traveling' },
  { id: 'clients',   key: 'clients'   },
  { id: 'stories',   key: 'stories'   },
  { id: 'contact',   key: 'contact'   },
];

const XBreadcrumb = ({ c }) => {
  const [active, setActive] = React.useState('home');
  const [hidden, setHidden] = React.useState(true);

  React.useEffect(() => {
    const onScroll = () => {
      setHidden(window.scrollY < 80);
      const mid = window.scrollY + window.innerHeight * 0.35;
      let current = 'home';
      for (const { id } of SECTIONS) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= mid) current = id;
      }
      setActive(current);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const label = c.breadcrumb?.[active] ?? (active.charAt(0).toUpperCase() + active.slice(1));

  return (
    <nav className={`xbread${hidden ? ' xbread--hidden' : ''}`} aria-label="breadcrumb">
      <a href="#home" className="xbread__home">
        <svg className="xbread__icon" viewBox="0 0 20 20" fill="none" aria-hidden="true" style={{width:16,height:16,flexShrink:0}}><path d="M10 2L2 9h2v9h5v-5h2v5h5V9h2L10 2z" fill="currentColor"/></svg>
        Ximbal
      </a>
      {active !== 'home' && (
        <>
          <span className="xbread__sep" aria-hidden="true">›</span>
          <span className="xbread__current">{label}</span>
        </>
      )}
    </nav>
  );
};

const XAbout = ({ c }) => {
  const C = c.about;
  return (
    <section className="xabout" id="about">
      <div data-anim className="container xabout__g">
        <div className="xabout__lt">
          <p className="eyebrow eyebrow--lg">{C.eyebrow}</p>

          <div className="gold-rule"></div>
          <p className="body-lg">{C.body}</p>
        </div>
        <ul className="xabout__diffs">
          {C.diffs.map((d, i) =>
          <li key={i} className="xabout__diff">
              <span className="xabout__chk">&#10003;</span>
              <span>{d}</span>
            </li>
          )}
        </ul>
      </div>
    </section>);

};

const XFooter = ({ c }) => {
  const C = c.footer;
  return (
    <footer className="xfoot">
      <div className="container xfoot__i">
        <p className="xfoot__logo">XIMBAL <em>GROUP</em></p>
        <p className="xfoot__tag">{C.tagline}</p>
        <p className="xfoot__copy">{C.copy}</p>
      </div>
    </footer>);

};

Object.assign(window, { Ornament, XNav, XHero, XAbout, XServices, XTraveling, XClients, XStory, XContact, XFooter });
</script>

  <script type="text/babel">
    (function () {
      const { TweaksPanel, TweakSection, TweakRadio, useTweaks } = window;

      const DEFS = /*EDITMODE-BEGIN*/{
        "variant": "Luminous"
      }/*EDITMODE-END*/;

      function App() {
        const [t, setTweak] = useTweaks(DEFS);
        const [lang, setLang] = React.useState('en');
        const c  = window.XC[lang];
        const isP = t.variant === 'Prestige';

        React.useEffect(() => {
          document.body.classList.toggle('v-luminous', !isP);
          document.documentElement.lang = lang;
        }, [isP, lang]);

        React.useEffect(() => {
          const els = Array.from(document.querySelectorAll('[data-anim]'));
          els.forEach(el => el.classList.remove('in'));
          const obs = new IntersectionObserver(
            entries => entries.forEach(e => {
              if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); }
            }),
            { threshold: 0.1 }
          );
          const timer = setTimeout(() => els.forEach(el => obs.observe(el)), 150);
          return () => { clearTimeout(timer); obs.disconnect(); };
        }, [lang, isP]);

        return (
          <React.Fragment>
            <XNav lang={lang} setLang={setLang} c={c} />
            <XBreadcrumb c={c} />
            <main>
              <XHero    c={c} isP={isP} />
              <XAbout   c={c} />
              <XServices c={c} />
              <XTraveling c={c} />
              <XClients  c={c} />
              <XStory   c={c} isP={isP} />
              <XContact  c={c} />
              <XFooter   c={c} />
            </main>
            <TweaksPanel>
              <TweakSection label="Design Direction" />
              <TweakRadio
                label="Style"
                value={t.variant}
                options={['Prestige', 'Luminous']}
                onChange={v => setTweak('variant', v)}
              />
            </TweaksPanel>
          </React.Fragment>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    })();
  </script>
